name: moblie_app
description: A new Flutter project.

publish_to: 'none'

version: 1.1.0+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  intl: ^0.20.2
  http: ^1.4.0
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  image: ^4.5.4
  scidart: ^0.0.2-dev.12
  syncfusion_flutter_core: ^30.2.6
  logger: ^2.5.0
  bot_toast: ^4.1.3
  google_fonts: ^6.2.1
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_native_splash: ^2.4.6
  image_pixels: ^4.0.2
  syncfusion_flutter_charts: ^30.2.6
  syncfusion_flutter_xlsio: ^30.2.6
  open_file: ^3.5.10
  csv: ^6.0.0
  file_picker: ^9.2.1
  share_plus: ^12.0.2

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/images/logo_app.jpg"

flutter_native_splash:
  color: "795548"
  # Circular-masked logo (brown outside circle blends into splash).
  image: lib/assets/images/logo_splash_circle.png
  android_12:
    color: "795548"
    icon_background_color: "795548"
    image: lib/assets/images/logo_splash_circle.png
  ios: true
  android: true
  web: false

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  file: ^7.0.1

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
