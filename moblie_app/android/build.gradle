allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// AGP 8+ requires namespace; inject it for older Flutter plugins that only declare package in the manifest.
subprojects { project ->
    project.plugins.withId("com.android.library") {
        def androidExt = project.extensions.findByName("android")
        if (androidExt != null && (androidExt.namespace == null || androidExt.namespace.toString().trim().isEmpty())) {
            def manifest = project.file("src/main/AndroidManifest.xml")
            if (manifest.exists()) {
                def pkg = new XmlSlurper().parse(manifest).@package?.toString()
                if (pkg) {
                    androidExt.namespace = pkg
                }
            } else if (project.group != null) {
                androidExt.namespace = project.group.toString()
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}
